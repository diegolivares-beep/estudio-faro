<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Carta digital</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Caveat:wght@500;700&family=Playfair+Display:wght@500;600;700&family=Bebas+Neue&family=Space+Grotesk:wght@500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@500;600;700&family=Oswald:wght@500;600;700&family=Anton&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.5/dist/pocketbase.umd.js"></script>
<style>
  :root{ --accent:#2f5d3a; --ink:#1c1917; --muted:#78716c; --line:#ece9e4; --bg:#faf8f5; --card:#fff; --fh:"Fraunces",Georgia,serif; --fb:"Inter",system-ui,sans-serif; --rad:16px; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:var(--fb); color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:680px; margin:0 auto; min-height:100dvh; }
  .serif{ font-family:var(--fh); }
  .tnum{ font-variant-numeric:tabular-nums; }
  img{ display:block; max-width:100%; }
  button{ font:inherit; cursor:pointer; }
  a{ color:inherit; }

  /* ---- publico ---- */
  .hero{ padding:34px 22px 20px; text-align:center; background:var(--card); border-bottom:1px solid var(--line); }
  .logo{ width:74px; height:74px; border-radius:18px; object-fit:cover; margin:0 auto 12px; box-shadow:0 6px 18px rgba(0,0,0,.08); }
  .logo.ph{ display:grid; place-items:center; color:#fff; font-family:Fraunces,serif; font-size:30px; font-weight:700; }
  .hero h1{ font-family:var(--fh); font-size:28px; font-weight:600; letter-spacing:-.01em; }
  .hero p{ color:var(--muted); font-size:14px; margin-top:5px; }
  .meta{ display:flex; gap:14px; justify-content:center; margin-top:12px; font-size:12.5px; color:var(--muted); flex-wrap:wrap; }
  .meta a{ display:inline-flex; align-items:center; gap:5px; text-decoration:none; }
  .navchips{ position:sticky; top:0; z-index:5; display:flex; gap:7px; overflow-x:auto; padding:11px 16px; background:rgba(250,248,245,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); scrollbar-width:none; }
  .navchips::-webkit-scrollbar{ display:none; }
  .chip{ white-space:nowrap; border:1px solid var(--line); background:#fff; border-radius:999px; padding:6px 13px; font-size:13px; font-weight:600; color:var(--muted); }
  .chip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .sec{ padding:24px 16px 4px; }
  .sec h2{ font-family:var(--fh); font-size:20px; font-weight:600; padding:0 6px 10px; }
  .item .ph-img{ border-radius:var(--rad); }
  .hero .logo{ border-radius:var(--rad); }
  .item{ display:flex; gap:13px; padding:13px 6px; border-bottom:1px solid var(--line); align-items:flex-start; }
  .item:last-child{ border-bottom:none; }
  .item .ph-img{ width:78px; height:78px; border-radius:13px; object-fit:cover; flex-shrink:0; background:#f0ece6; }
  .item .body{ flex:1; min-width:0; }
  .item .nm{ font-weight:600; font-size:15px; }
  .item .ds{ color:var(--muted); font-size:13px; margin-top:2px; line-height:1.4; }
  .item .pr{ font-weight:700; font-size:15px; margin-top:6px; }
  .item.off{ opacity:.45; }
  .item .badge-off{ font-size:11px; font-weight:700; color:#b91c1c; background:#fee2e2; border-radius:6px; padding:1px 7px; }
  .wabtn{ position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:20; display:inline-flex; align-items:center; gap:8px; background:#22c55e; color:#fff; font-weight:700; font-size:15px; padding:13px 22px; border-radius:999px; box-shadow:0 8px 22px rgba(34,197,94,.4); text-decoration:none; }
  .foot{ text-align:center; color:var(--muted); font-size:12px; padding:34px 16px 96px; }
  .foot .made{ margin-top:6px; opacity:.7; }

  /* ---- editor ---- */
  .ed{ max-width:720px; margin:0 auto; padding:18px 16px 80px; }
  .edtop{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .edtop h1{ font-family:Fraunces,serif; font-size:22px; font-weight:600; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px; }
  .card h3{ font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); margin-bottom:12px; font-weight:700; }
  label.f{ display:block; margin-bottom:10px; }
  label.f span{ font-size:12px; color:var(--muted); }
  .in{ width:100%; margin-top:3px; border:1px solid var(--line); border-radius:10px; padding:9px 11px; font:inherit; font-size:14px; outline:none; background:#fff; }
  .in:focus{ border-color:var(--accent); }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn{ border:none; border-radius:10px; padding:9px 15px; font-weight:600; font-size:14px; background:var(--accent); color:#fff; display:inline-flex; align-items:center; gap:6px; }
  .btn.ghost{ background:#fff; border:1px solid var(--line); color:var(--ink); }
  .btn.sm{ padding:6px 11px; font-size:13px; }
  .btn.danger{ background:#fff; border:1px solid #fecaca; color:#dc2626; }
  .prod{ display:flex; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); }
  .prod:last-child{ border-bottom:none; }
  .prod .thumb{ width:46px; height:46px; border-radius:9px; object-fit:cover; background:#f0ece6; flex-shrink:0; }
  .thumblbl{ width:46px; height:46px; border-radius:9px; overflow:hidden; flex-shrink:0; cursor:pointer; display:grid; place-items:center; background:#f0ece6; border:1px dashed #cbb; }
  .thumblbl img{ width:100%; height:100%; object-fit:cover; }
  .thumblbl .addf{ font-size:9px; color:#9a8f80; text-align:center; line-height:1.1; }
  .prod .pn{ font-weight:600; font-size:14px; }
  .prod .pd{ color:var(--muted); font-size:12.5px; }
  .toggle{ width:40px; height:23px; border-radius:999px; background:#d6d3d1; position:relative; flex-shrink:0; border:none; }
  .toggle.on{ background:var(--accent); }
  .toggle b{ position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:50%; background:#fff; transition:.15s; }
  .toggle.on b{ left:19px; }
  .login{ max-width:380px; margin:8vh auto; padding:0 18px; }
  .login .box{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
  .center{ min-height:100dvh; display:grid; place-items:center; color:var(--muted); font-size:14px; }
  .pill{ font-size:11px; font-weight:700; border-radius:999px; padding:3px 9px; }
  .pill.fotos{ background:#ecfdf5; color:#047857; } .pill.texto{ background:#f1f5f9; color:#475569; }
  .pill.pub{ background:#ecfdf5; color:#047857; } .pill.nopub{ background:#fef3c7; color:#92400e; }
  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1c1917; color:#fff; padding:11px 18px; border-radius:12px; font-size:14px; z-index:50; box-shadow:0 8px 24px rgba(0,0,0,.25); }
  .muted{ color:var(--muted); font-size:13px; }
  .hide{ display:none; }

  /* ---- variantes de tema ---- */
  .chip{ background:var(--card); }
  .navchips{ background:color-mix(in srgb, var(--bg) 90%, transparent); }
  body.t-dark .hero{ background:var(--card); }
  body.t-dark .chip{ background:var(--card); border-color:#3a3a3e; }
  body.t-dark .item .ph-img{ background:#26262b; }
  body.t-brutal .hero, body.t-brutal .navchips{ border-bottom:2px solid var(--ink); }
  body.t-brutal .hero .logo, body.t-brutal .item .ph-img{ border:2px solid var(--ink); box-shadow:4px 4px 0 var(--ink); }
  body.t-brutal .chip{ border:2px solid var(--ink); border-radius:6px; }
  body.t-brutal .chip.on{ background:var(--accent); color:#fff; }
  body.t-brutal .wabtn{ border-radius:6px; border:2px solid #14532d; box-shadow:4px 4px 0 #14532d; }
  body.t-rounded .chip, body.t-rounded .wabtn{ border-radius:999px; }

  /* layout: centrado (editorial) */
  body.t-center .sec h2{ text-align:center; }
  body.t-center .navchips{ justify-content:center; }
  .item.ic{ flex-direction:column; align-items:center; text-align:center; gap:3px; padding:15px 6px; }
  .item.ic .ds{ max-width:44ch; }
  .item.ic .pr{ margin-top:3px; }
  /* layout: leader (linea de puntos hacia el precio) */
  .item.il{ align-items:flex-start; }
  .item.il .ilimg{ flex-shrink:0; }
  .item.il .lrow{ display:flex; align-items:baseline; gap:7px; }
  .item.il .lrow .nm{ flex-shrink:0; }
  .item.il .dots{ flex:1; border-bottom:1.5px dotted var(--muted); opacity:.45; transform:translateY(-3px); min-width:16px; }
  .item.il .lrow .pr{ flex-shrink:0; margin:0; }
  /* layout: grilla (foto arriba) */
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 4px; }
  .item.ig{ display:block; padding:0; overflow:hidden; background:var(--card); border:1px solid var(--line); border-radius:var(--rad); }
  .item.ig .gimg{ width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#efe9e1; }
  .item.ig .gbody{ padding:10px 12px; }
  .item.ig .nm{ font-size:14px; }
  .item.ig .ds{ font-size:12px; }
  body.t-brutal .item.ig{ box-shadow:3px 3px 0 var(--ink); }

  /* estructura: clasica (enmarcada, cinta, 2 columnas) */
  .marco{ padding:12px; }
  .marco-in{ border:1px solid var(--accent); outline:1px solid var(--accent); outline-offset:5px; padding:26px 20px 18px; }
  .secclas{ padding:0; }
  .ribbon{ position:relative; text-align:center; margin:26px 0 14px; padding:0; font-family:var(--fh); font-size:21px; font-weight:600; }
  .secclas:first-child .ribbon{ margin-top:4px; }
  .ribbon span{ position:relative; z-index:1; padding:0 16px; background:var(--bg); text-transform:uppercase; letter-spacing:.04em; }
  .ribbon::before{ content:""; position:absolute; left:6%; right:6%; top:54%; border-top:1px solid var(--accent); opacity:.45; }
  .cols2{ columns:2; column-gap:30px; }
  @media(max-width:560px){ .cols2{ columns:1; } }
  .clitem{ break-inside:avoid; padding:8px 0; }
  .clitem .lrow{ display:flex; align-items:baseline; gap:6px; }
  .clitem .nm{ font-weight:600; font-size:14.5px; flex-shrink:0; }
  .clitem .dots{ flex:1; border-bottom:1px dotted var(--muted); opacity:.4; transform:translateY(-3px); min-width:14px; }
  .clitem .pr{ flex-shrink:0; color:var(--accent); font-weight:700; }
  .clitem .ds{ font-size:12px; color:var(--muted); margin-top:1px; line-height:1.35; }
  .clitem.off{ opacity:.45; }

  /* estructura: revista (foto grande por plato, alternada) */
  .rmag{ font-family:var(--fh); font-size:24px; font-weight:600; text-align:center; padding:20px 6px 12px; }
  .ritem{ display:flex; gap:16px; align-items:center; padding:14px 6px; border-bottom:1px solid var(--line); }
  .ritem.rev{ flex-direction:row-reverse; }
  .ritem .rimg{ width:42%; aspect-ratio:4/3; object-fit:cover; border-radius:var(--rad); background:#efe9e1; flex-shrink:0; }
  .ritem .rbody{ flex:1; min-width:0; }
  .ritem .rtop{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .ritem .rtop .nm{ font-family:var(--fh); font-size:19px; font-weight:600; line-height:1.15; }
  .ritem .rbody .ds{ margin-top:4px; font-size:13.5px; }
  @media(max-width:560px){ .ritem, .ritem.rev{ flex-direction:column; align-items:stretch; } .ritem .rimg{ width:100%; } }

  /* estructura: pizarra (chalkboard) */
  .pizmarco{ margin:10px; border:2px dashed rgba(232,220,160,.4); border-radius:8px; padding:16px 12px 8px; }
  .pizh{ font-family:var(--fh); font-size:30px; font-weight:700; text-align:center; color:var(--accent); margin:14px 0 6px; }

  /* modo PDF */
  .pdfbox{ height:calc(100dvh - 230px); min-height:460px; background:#525659; }
  .pdfbox iframe{ width:100%; height:100%; border:none; display:block; }

  /* ---- barra de previsualizacion (demo) ---- */
  .pvbar{ position:fixed; top:0; left:0; right:0; z-index:60; background:#0d0d0f; color:#fff; display:flex; gap:7px; align-items:center; padding:8px 12px; overflow-x:auto; scrollbar-width:none; }
  .pvbar::-webkit-scrollbar{ display:none; }
  .pvbar .lbl{ font-family:Inter,sans-serif; font-weight:700; font-size:11px; letter-spacing:.04em; text-transform:uppercase; opacity:.55; white-space:nowrap; }
  .pvbar .pv{ white-space:nowrap; border:1px solid #3a3a40; background:transparent; color:#fff; border-radius:999px; padding:5px 12px; font-size:12.5px; font-weight:600; }
  .pvbar .pv.on{ background:#fff; color:#0d0d0f; border-color:#fff; }
  .pvbar .div{ width:1px; height:20px; background:#3a3a40; flex-shrink:0; }
  body.haspv .wrap{ padding-top:46px; }
  .choosercta{ position:fixed; left:0; right:0; bottom:0; z-index:60; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 18px; background:#0d0d0f; color:#fff; }
  .choosercta span{ font-size:13px; }
  .choosercta .btn2{ background:#22c55e; color:#fff; border:none; border-radius:10px; padding:11px 20px; font-weight:700; font-size:14px; cursor:pointer; }
  .temagrid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px; }
  @media(min-width:560px){ .temagrid{ grid-template-columns:repeat(5,1fr); } }
  .temaopt{ display:flex; align-items:center; gap:7px; border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 10px; font-size:13px; font-weight:600; color:#1c1917; }
  .temaopt.on{ border-color:#2f5d3a; box-shadow:0 0 0 1px #2f5d3a inset; }
  .temaopt .sw{ width:14px; height:14px; border-radius:50%; flex-shrink:0; border:1px solid rgba(0,0,0,.1); }

  /* ---- solicitar (venta) ---- */
  .solic{ max-width:760px; margin:0 auto; padding:46px 18px 80px; text-align:center; }
  .solic h1{ font-family:Fraunces,serif; font-size:30px; font-weight:600; }
  .solic .sub{ color:var(--muted); font-size:15px; margin-top:8px; max-width:460px; margin-left:auto; margin-right:auto; }
  .plans{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:30px 0 18px; text-align:left; }
  @media(max-width:760px){ .plans{ grid-template-columns:1fr; max-width:420px; margin-left:auto; margin-right:auto; } }
  .plan{ position:relative; background:#fff; border:1px solid var(--line); border-radius:18px; padding:22px; display:flex; flex-direction:column; }
  .plan.dest{ border:2px solid var(--accent); box-shadow:0 12px 30px rgba(47,93,58,.12); }
  .plan .tag{ position:absolute; top:-11px; left:22px; background:var(--accent); color:#fff; font-size:11px; font-weight:700; padding:3px 11px; border-radius:999px; }
  .plan .pname{ font-weight:700; font-size:16px; }
  .plan .pprice{ font-family:Fraunces,serif; font-size:34px; font-weight:600; margin:6px 0 2px; }
  .plan .pprice span{ font-family:Inter,sans-serif; font-size:14px; color:var(--muted); font-weight:500; }
  .plan ul{ list-style:none; margin:14px 0 18px; display:flex; flex-direction:column; gap:8px; }
  .plan li{ font-size:14px; color:var(--ink); padding-left:22px; position:relative; }
  .plan li::before{ content:"✓"; position:absolute; left:0; color:var(--accent); font-weight:700; }
  .plan .wa{ margin-top:auto; display:inline-flex; align-items:center; justify-content:center; gap:8px; background:#22c55e; color:#fff; font-weight:700; padding:12px; border-radius:12px; text-decoration:none; }
</style>
</head>

<div id="app" class="center">Cargando...</div>

<script>
const PB_URL = "https://c796uegsehkken8hrlcfejfk.195.200.7.236.sslip.io";
const FARO_WHATSAPP = "56971466930"; // WhatsApp Estudio Faro
const pb = new PocketBase(PB_URL);
const app = document.getElementById("app");
const clp = (n) => "$" + Math.round(n||0).toLocaleString("es-CL");
const esc = (s) => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fileUrl = (col, rec, name, thumb) => name ? `${PB_URL}/api/files/${col}/${rec}/${name}${thumb?`?thumb=${thumb}`:""}` : "";
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }

// ---- routing: /carta/<slug>[/editar]  o  /carta/#/<slug>[/editar] ----
function route(){
  let path = location.pathname.replace(/^\/carta\/?/,"");
  if(!path && location.hash) path = location.hash.replace(/^#\/?/,"");
  const seg = path.split("/").filter(Boolean);
  return { slug: seg[0] || "", editar: seg[1] === "editar" };
}

async function start(){
  const { slug, editar } = route();
  if(!slug){ return renderSolicitar(""); }              // /carta -> pagina de venta
  if(editar){ return renderEditorGate(slug); }
  return renderPublic(slug);
}

// =================== SOLICITAR (venta) ===================
function waLink(plan){
  const txt = `Hola Estudio Faro! Quiero una carta digital ${plan} para mi negocio. Mi local se llama: `;
  return `https://wa.me/${FARO_WHATSAPP}?text=${encodeURIComponent(txt)}`;
}
function renderSolicitar(slug){
  document.documentElement.style.setProperty("--accent", "#2f5d3a");
  document.title = "Carta digital · Estudio Faro";
  app.className = "";
  const plan = (label, precio, feats, dest, planTxt) => `
    <div class="plan ${dest?"dest":""}">
      ${dest?'<div class="tag">Mas vendido</div>':""}
      <div class="pname">${label}</div>
      <div class="pprice tnum">${precio}<span>/año</span></div>
      <ul>${feats.map(f=>`<li>${f}</li>`).join("")}</ul>
      <a class="wa" href="${waLink(planTxt)}" target="_blank">Solicitar por WhatsApp</a>
    </div>`;
  app.innerHTML = `<div class="solic">
    <h1>Tu carta digital</h1>
    <p class="sub">Tus clientes la ven escaneando un QR en la mesa. Tu la editas cuando quieras, desde el celular. Sin apps, sin imprimir.</p>
    <a class="btn" href="/carta/jardin-del-cafe?estilos=1" style="margin-top:6px;text-decoration:none">Ver demo en vivo (12 estilos)</a>
    <div class="plans">
      ${plan("Solo texto", "$10.000", ["Secciones y productos ilimitados","Precios y descripciones","Boton de pedido por WhatsApp","QR para la mesa","Tu mismo la editas online"], false, "sin foto")}
      ${plan("Con fotos", "$30.000", ["Todo lo del plan solo texto","Una foto por producto","Se ve mucho mas vendedor (ideal comida)","Fotos optimizadas automaticamente"], true, "con foto")}
      ${plan("Tu propio PDF", "$30.000", ["Subes TU carta en PDF","La publicamos con tu QR","Sin usar nuestras plantillas","Ideal si ya tienes tu diseno"], false, "con mi PDF (subo mi propia carta)")}
    </div>
    <p class="sub">Eliges tu plan, coordinamos por WhatsApp y apenas confirmas el pago te creamos la cuenta y te enviamos tu link para editar.</p>
    ${slug ? `<button class="btn ghost" style="margin-top:14px" onclick="renderLogin('${slug}')">Ya tengo cuenta</button>` : ""}
  </div>`;
}

// =================== TEMAS ===================
const THEMES = {
  casero:   { nombre:"Casero",        layout:"centrado",vars:{ accent:"#a6332e", ink:"#5a4632", muted:"#8c857a", line:"#ddd0b8", bg:"#f3eee3", card:"#fffdf8", fh:"'Caveat',cursive", fb:"'Inter',sans-serif", rad:"14px" }, cls:["t-center"] },
  barrio:   { nombre:"Almacen",       layout:"tarjeta", vars:{ accent:"#d9531e", ink:"#2b2b2b", muted:"#7a7268", line:"#e8ddc9", bg:"#f4ecdc", card:"#ffffff", fh:"'Oswald',sans-serif", fb:"'Inter',sans-serif", rad:"8px" } },
  cafe:     { nombre:"Cafeteria",     layout:"tarjeta", vars:{ accent:"#2f5d3a", ink:"#1e1b17", muted:"#8a7b66", line:"#e3dccf", bg:"#ede7da", card:"#ffffff", fh:"'Fraunces',serif", fb:"'Inter',sans-serif", rad:"16px" } },
  soda:     { nombre:"Fuente de soda",layout:"leader",  vars:{ accent:"#b73225", ink:"#2a2422", muted:"#8a7d6b", line:"#e7d3b8", bg:"#fff8ef", card:"#ffffff", fh:"'Bebas Neue',sans-serif", fb:"'Inter',sans-serif", rad:"6px" } },
  bistro:   { nombre:"Bistro",        layout:"clasica", vars:{ accent:"#21314a", ink:"#21314a", muted:"#6b7280", line:"#e2dccc", bg:"#f4f0e6", card:"#ffffff", fh:"'Cormorant Garamond',serif", fb:"'Inter',sans-serif", rad:"10px" }, cls:["t-center"] },
  elegante: { nombre:"Elegante",      layout:"clasica", vars:{ accent:"#b8923c", ink:"#2b2620", muted:"#8a8074", line:"#e3dac6", bg:"#f2ebdd", card:"#fffdf9", fh:"'Playfair Display',serif", fb:"'Inter',sans-serif", rad:"8px" }, cls:["t-center"] },
  minimal:  { nombre:"Minimal",       layout:"centrado",vars:{ accent:"#1c1917", ink:"#1f1f1d", muted:"#6f6f6a", line:"#cfc9bb", bg:"#f4f1ea", card:"#ffffff", fh:"'Cormorant Garamond',serif", fb:"'Inter',sans-serif", rad:"0px" }, cls:["t-center"] },
  premium:  { nombre:"Premium",       layout:"clasica", vars:{ accent:"#c79a3b", ink:"#f2f4f8", muted:"#9fb0c8", line:"#1d2a4a", bg:"#0a1a3f", card:"#15234e", fh:"'Playfair Display',serif", fb:"'Inter',sans-serif", rad:"12px" }, cls:["t-dark","t-center"] },
  brutal:   { nombre:"Brutalista",    layout:"grilla",  vars:{ accent:"#c81e16", ink:"#1a1a1a", muted:"#555555", line:"#1a1a1a", bg:"#fde047", card:"#ffffff", fh:"'Anton',sans-serif", fb:"'Inter',sans-serif", rad:"0px" }, cls:["t-brutal"] },
  tropical: { nombre:"Tropical",      layout:"grilla",  vars:{ accent:"#e6177f", ink:"#1f2937", muted:"#6b7280", line:"#fde4d3", bg:"#fbf6ec", card:"#ffffff", fh:"'Poppins',sans-serif", fb:"'Poppins',sans-serif", rad:"22px" }, cls:["t-rounded"] },
  revista:  { nombre:"Revista",       layout:"revista", vars:{ accent:"#b91c1c", ink:"#1a1a1a", muted:"#6b7280", line:"#e7e5e4", bg:"#ffffff", card:"#fafaf9", fh:"'Fraunces',serif", fb:"'Inter',sans-serif", rad:"14px" } },
  pizarra:  { nombre:"Pizarra",       layout:"pizarra", vars:{ accent:"#e8dca0", ink:"#f2efe6", muted:"#b3ab9a", line:"#4a4f44", bg:"#27302b", card:"#2e372f", fh:"'Caveat',cursive", fb:"'Inter',sans-serif", rad:"6px" }, cls:["t-dark"] },
};
const TEMA_ORDER = ["casero","barrio","cafe","soda","bistro","elegante","minimal","premium","brutal","tropical","revista","pizarra"];
function applyTheme(t, accentOverride){
  const r=document.documentElement.style, v=t.vars;
  r.setProperty("--accent", accentOverride || v.accent); r.setProperty("--ink",v.ink); r.setProperty("--muted",v.muted);
  r.setProperty("--line",v.line); r.setProperty("--bg",v.bg); r.setProperty("--card",v.card);
  r.setProperty("--fh",v.fh); r.setProperty("--fb",v.fb); r.setProperty("--rad",v.rad);
  document.body.classList.remove("t-dark","t-brutal","t-rounded");
  (t.cls||[]).forEach(c=>document.body.classList.add(c));
}

// =================== PUBLICO / CHOOSER ===================
async function renderPublic(slug, chooser=false){
  let carta;
  try{
    carta = chooser
      ? await pb.collection("cartas").getFirstListItem(`slug="${slug}"`)      // dueno autenticado (ve aunque no este publicada)
      : await pb.collection("cartas").getFirstListItem(`slug="${slug}" && publicada=true`);
  }
  catch(e){ app.className=""; app.innerHTML = `<div class="center">Esta carta no existe o no esta publicada.</div>`; return; }
  CARTA = carta;
  document.title = carta.nombre + " · Carta";
  if(carta.modo === "pdf" && carta.pdf){ return renderPdf(carta); }
  const secs = await pb.collection("secciones").getFullList({ filter:`carta="${carta.id}"`, sort:"orden,nombre" });
  const prods = await pb.collection("productos").getFullList({ filter:`carta="${carta.id}"`, sort:"orden,nombre" });
  const bySec = {}; secs.forEach(s=>bySec[s.id]=[]); prods.forEach(p=>{ (bySec[p.seccion]=bySec[p.seccion]||[]).push(p); });

  const qp = new URLSearchParams(location.search);
  const preview = chooser || qp.has("estilos");
  let tema = (THEMES[qp.get("tema")] ? qp.get("tema") : (THEMES[carta.tema] ? carta.tema : "cafe"));
  let conFotos = qp.has("fotos") ? qp.get("fotos")!=="0" : (carta.plan === "fotos");
  document.body.classList.toggle("haspv", preview);

  function paint(){
    // en preview / ?tema se muestran los temas puros; en real, el color del dueno manda sobre el tema
    applyTheme(THEMES[tema], (preview || qp.has("tema")) ? null : (carta.color||null));
    app.className="";
    const logo = carta.logo
      ? `<img class="logo" src="${fileUrl("cartas",carta.id,carta.logo,"200x200")}" alt="">`
      : `<div class="logo ph" style="background:var(--accent)">${esc(carta.nombre.charAt(0))}</div>`;
    const meta = [];
    if(carta.direccion) meta.push(`<span>📍 ${esc(carta.direccion)}</span>`);
    if(carta.instagram) meta.push(`<a href="https://instagram.com/${esc(carta.instagram)}" target="_blank">@${esc(carta.instagram)}</a>`);
    const lay = THEMES[tema].layout || "tarjeta";
    const chips = secs.map((s,i)=>`<button class="chip ${i===0?"on":""}" data-s="${s.id}">${esc(s.nombre)}</button>`).join("");
    const agot = (p)=> p.disponible===false?'<span class="badge-off">Agotado</span>':"";
    const desc = (p)=> p.descripcion?`<div class="ds">${esc(p.descripcion)}</div>`:"";
    const pr = (p)=> p.precio?`<div class="pr tnum" style="color:var(--accent)">${clp(p.precio)}</div>`:"";
    const imgL = (p)=> (conFotos && p.foto) ? `<img class="ph-img" src="${fileUrl("productos",p.id,p.foto,"400x300")}" alt="">` : "";
    const imgT = (p)=> (conFotos && p.foto) ? `<img class="gimg" src="${fileUrl("productos",p.id,p.foto,"600x400")}" alt="">` : "";
    function itemHTML(p){
      const off = p.disponible===false?"off":"";
      if(lay==="centrado") return `<div class="item ic ${off}">
        <div class="nm">${esc(p.nombre)} ${agot(p)}</div>${desc(p)}${pr(p)}</div>`;
      if(lay==="grilla") return `<div class="item ig ${off}">${imgT(p)}
        <div class="gbody"><div class="nm">${esc(p.nombre)} ${agot(p)}</div>${desc(p)}${pr(p)}</div></div>`;
      if(lay==="leader") return `<div class="item il ${off}">${(conFotos && p.foto)?`<div class="ilimg">${imgL(p)}</div>`:""}
        <div class="body"><div class="lrow"><span class="nm">${esc(p.nombre)}</span><span class="dots"></span>${p.precio?`<span class="pr tnum" style="color:var(--accent)">${clp(p.precio)}</span>`:""}</div>${desc(p)}${p.disponible===false?`<div>${agot(p)}</div>`:""}</div></div>`;
      // tarjeta (default)
      return `<div class="item ${off}">${imgL(p)}
        <div class="body"><div class="nm">${esc(p.nombre)} ${agot(p)}</div>${desc(p)}${pr(p)}</div></div>`;
    }
    let body;
    if(lay==="clasica"){
      const itemClas = (p)=>`<div class="clitem ${p.disponible===false?"off":""}">
        <div class="lrow"><span class="nm">${esc(p.nombre)}</span><span class="dots"></span>${p.precio?`<span class="pr tnum">${clp(p.precio)}</span>`:""}</div>
        ${p.descripcion?`<div class="ds">${esc(p.descripcion)}</div>`:""}${p.disponible===false?`<div>${agot(p)}</div>`:""}</div>`;
      body = `<div class="marco"><div class="marco-in">` + secs.map(s=>`
        <section class="sec secclas" id="sec-${s.id}">
          <h2 class="ribbon"><span>${esc(s.nombre)}</span></h2>
          <div class="cols2">${(bySec[s.id]||[]).map(itemClas).join("") || `<div class="muted">Pronto...</div>`}</div>
        </section>`).join("") + `</div></div>`;
    } else if(lay==="revista"){
      body = secs.map(s=>`<section class="sec" id="sec-${s.id}"><h2 class="rmag">${esc(s.nombre)}</h2>
        ${(bySec[s.id]||[]).map((p,i)=>`<div class="ritem ${i%2?"rev":""} ${p.disponible===false?"off":""}">
          ${(conFotos && p.foto)?`<img class="rimg" src="${fileUrl("productos",p.id,p.foto,"800x0")}" alt="">`:""}
          <div class="rbody"><div class="rtop"><span class="nm">${esc(p.nombre)}</span>${p.precio?`<span class="pr tnum" style="color:var(--accent)">${clp(p.precio)}</span>`:""}</div>${desc(p)}${p.disponible===false?`<div>${agot(p)}</div>`:""}</div>
        </div>`).join("") || `<div class="muted">Pronto...</div>`}
      </section>`).join("");
    } else if(lay==="pizarra"){
      body = `<div class="pizmarco">`+secs.map(s=>`<section class="sec" id="sec-${s.id}"><h2 class="pizh">${esc(s.nombre)}</h2>
        <div class="cols2">${(bySec[s.id]||[]).map(p=>`<div class="clitem ${p.disponible===false?"off":""}"><div class="lrow"><span class="nm">${esc(p.nombre)}</span><span class="dots"></span>${p.precio?`<span class="pr tnum">${clp(p.precio)}</span>`:""}</div>${desc(p)}</div>`).join("") || `<div class="muted">Pronto...</div>`}</div>
      </section>`).join("")+`</div>`;
    } else {
      body = secs.map(s=>{
        const items = (bySec[s.id]||[]).map(itemHTML).join("") || `<div class="muted" style="padding:6px">Pronto...</div>`;
        return `<section class="sec" id="sec-${s.id}"><h2>${esc(s.nombre)}</h2>${lay==="grilla"?`<div class="grid2">${items}</div>`:items}</section>`;
      }).join("");
    }
    const wa = (!chooser && carta.whatsapp) ? `<a class="wabtn" href="https://wa.me/${esc(carta.whatsapp.replace(/\D/g,""))}" target="_blank">Pedir por WhatsApp</a>` : "";
    const cta = chooser ? `<div class="choosercta"><span>Estilo elegido: <b>${THEMES[tema].nombre}</b></span><button class="btn2" onclick="usarEstilo('${tema}')">Usar este estilo</button></div>` : "";
    const pvbar = preview ? `<div class="pvbar">
      <span class="lbl">Estilo</span>
      ${TEMA_ORDER.map(id=>`<button class="pv ${id===tema?"on":""}" data-t="${id}">${THEMES[id].nombre}</button>`).join("")}
      <span class="div"></span>
      <span class="lbl">Fotos</span>
      <button class="pv ${conFotos?"on":""}" data-f="1">Con fotos</button>
      <button class="pv ${!conFotos?"on":""}" data-f="0">Solo texto</button>
    </div>` : "";

    app.innerHTML = `${pvbar}<div class="wrap">
      <header class="hero">${logo}<h1 class="serif">${esc(carta.nombre)}</h1>
        ${carta.descripcion?`<p>${esc(carta.descripcion)}</p>`:""}
        ${meta.length?`<div class="meta">${meta.join("")}</div>`:""}
      </header>
      ${secs.length>1?`<nav class="navchips">${chips}</nav>`:""}
      ${body}
      <div class="foot">${esc(carta.nombre)}${carta.direccion?` · ${esc(carta.direccion)}`:""}
        <div class="made">Carta digital por Estudio Faro</div>
      </div>
      ${wa}
    </div>${cta}`;

    document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ document.getElementById("sec-"+c.dataset.s)?.scrollIntoView({behavior:"smooth",block:"start"}); });
    if(preview){
      document.querySelectorAll(".pv[data-t]").forEach(b=>b.onclick=()=>{ tema=b.dataset.t; paint(); });
      document.querySelectorAll(".pv[data-f]").forEach(b=>b.onclick=()=>{ conFotos=b.dataset.f==="1"; paint(); });
    }
    const obs = new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting){ document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on", c.dataset.s===e.target.id.replace("sec-",""))); } }); }, { rootMargin:"-45% 0px -50% 0px" });
    secs.forEach(s=>{ const el=document.getElementById("sec-"+s.id); if(el) obs.observe(el); });
  }
  paint();
}

function renderPdf(carta){
  applyTheme(THEMES[THEMES[carta.tema]?carta.tema:"minimal"], carta.color||null);
  document.body.classList.remove("haspv");
  const logo = carta.logo ? `<img class="logo" src="${fileUrl('cartas',carta.id,carta.logo,'200x200')}">` : `<div class="logo ph" style="background:var(--accent)">${esc(carta.nombre.charAt(0))}</div>`;
  const pdfurl = fileUrl("cartas",carta.id,carta.pdf,"");
  const wa = carta.whatsapp ? `<a class="wabtn" href="https://wa.me/${esc(carta.whatsapp.replace(/\D/g,""))}" target="_blank">Pedir por WhatsApp</a>` : "";
  app.className="";
  app.innerHTML = `<div class="wrap">
    <header class="hero">${logo}<h1 class="serif">${esc(carta.nombre)}</h1>${carta.descripcion?`<p>${esc(carta.descripcion)}</p>`:""}</header>
    <div class="pdfbox"><iframe src="${pdfurl}#view=FitH" title="Carta en PDF"></iframe></div>
    <div class="foot"><a href="${pdfurl}" target="_blank" style="color:var(--accent);text-decoration:underline">Abrir / descargar la carta (PDF)</a><div class="made">Carta digital por Estudio Faro</div></div>
    ${wa}
  </div>`;
}

async function renderEditorGate(slug){
  if(!pb.authStore.isValid) return renderLogin(slug);
  return renderEditor(slug);
}
function renderLogin(slug){
  app.className="";
  app.innerHTML = `<div class="login"><div class="box">
    <h1 class="serif" style="font-size:22px;margin-bottom:4px">Editar tu carta</h1>
    <p class="muted" style="margin-bottom:18px">Ingresa para editar <b>${esc(slug)}</b></p>
    <label class="f"><span>Email</span><input class="in" id="le" type="email" autocomplete="username"></label>
    <label class="f"><span>Contrasena</span><input class="in" id="lp" type="password" autocomplete="current-password"></label>
    <button class="btn" id="lb" style="width:100%;justify-content:center;margin-top:6px">Entrar</button>
    <div id="lerr" class="muted" style="color:#dc2626;margin-top:10px"></div>
    <div style="text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)">
      <div class="muted" style="margin-bottom:8px">No tienes cuenta todavia?</div>
      <button class="btn ghost" style="width:100%;justify-content:center" onclick="renderSolicitar('${esc(slug)}')">Solicitar mi carta</button>
    </div>
  </div></div>`;
  document.getElementById("lb").onclick = async ()=>{
    try{
      await pb.collection("duenos").authWithPassword(document.getElementById("le").value.trim(), document.getElementById("lp").value);
      renderEditor(slug);
    }catch(e){ document.getElementById("lerr").textContent = "Email o contrasena incorrectos."; }
  };
  document.getElementById("lp").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("lb").click(); });
}

let CARTA=null, SECS=[], PRODS=[];

  SECS = await pb.collection("secciones").getFullList({ filter:`carta="${CARTA.id}"`, sort:"orden,nombre" });
  PRODS = await pb.collection("productos").getFullList({ filter:`carta="${CARTA.id}"`, sort:"orden,nombre" });
  drawEditor(slug);
}

        <button class="toggle ${p.disponible!==false?"on":""}" onclick="toggleDisp('${p.id}',${p.disponible!==false})"><b></b></button>
        <button class="btn ghost sm" onclick="editProd('${p.id}')">Editar</button>
        <button class="btn danger sm" onclick="delProd('${p.id}')">x</button>
      </div>`).join("")}
      <button class="btn ghost sm" style="margin-top:8px" onclick="addProd('${s.id}')">+ Producto</button>
    </div>`;
  }).join("") || `<p class="muted">Aun no tienes secciones. Crea la primera abajo.</p>`;
}

// ---- acciones editor ----
async function guardarCarta(){
  try{
    CARTA = await pb.collection("cartas").update(CARTA.id, {
      nombre:val("c_nombre"), descripcion:val("c_desc"), whatsapp:val("c_wa"),
      color:val("c_color"), direccion:val("c_dir"), instagram:val("c_ig").replace(/^@/,"")
    });
    const lf = document.getElementById("c_logo");
    if(lf && lf.files[0]){ CARTA = await uploadFile("cartas", CARTA.id, "logo", lf.files[0]); }
    toast("Datos guardados");
  }catch(e){ toast("Error al guardar"); }
}
async function togglePub(){ CARTA = await pb.collection("cartas").update(CARTA.id,{ publicada:!CARTA.publicada }); drawEditor(route().slug); }
async function setTema(id){ CARTA = await pb.collection("cartas").update(CARTA.id,{ tema:id }); drawEditor(route().slug); toast("Estilo: "+THEMES[id].nombre); }
async function usarEstilo(id){ CARTA = await pb.collection("cartas").update(CARTA.id,{ tema:id, estiloElegido:true }); document.body.classList.remove("haspv"); toast("Estilo aplicado: "+THEMES[id].nombre); renderEditor(route().slug); }
async function setModo(m){ CARTA = await pb.collection("cartas").update(CARTA.id,{ modo:m }); drawEditor(route().slug); toast(m==="pdf"?"Modo PDF activado":"Modo plantilla activado"); }
async function subirPdf(){ const f=document.getElementById("c_pdf"); if(!f||!f.files[0]){ toast("Elige un archivo PDF","warn"); return; } toast("Subiendo PDF..."); try{ CARTA = await uploadFile("cartas", CARTA.id, "pdf", f.files[0]); drawEditor(route().slug); toast("PDF subido y publicado"); }catch(e){ console.error(e); toast("No se pudo subir el PDF"); } }
async function addSeccion(){ const n=val("newsec").trim(); if(!n) return; const r=await pb.collection("secciones").create({ carta:CARTA.id, nombre:n, orden:SECS.length+1 }); SECS.push(r); document.getElementById("newsec").value=""; drawSecs(); toast("Seccion creada"); }
async function renSeccion(id,n){ await pb.collection("secciones").update(id,{nombre:n}); const s=SECS.find(x=>x.id===id); if(s)s.nombre=n; toast("Guardado"); }
async function delSeccion(id){ if(!confirm("Eliminar la seccion y sus productos?")) return; await pb.collection("secciones").delete(id); SECS=SECS.filter(x=>x.id!==id); PRODS=PRODS.filter(p=>p.seccion!==id); drawSecs(); toast("Seccion eliminada"); }
async function addProd(secId){
  const nombre = prompt("Nombre del producto:"); if(!nombre) return;
  const precio = Number((prompt("Precio (solo numeros):","")||"").replace(/\D/g,"")) || 0;
  const r = await pb.collection("productos").create({ carta:CARTA.id, seccion:secId, nombre, precio, disponible:true, orden:PRODS.length+1 });
  PRODS.push(r); drawSecs(); toast("Producto agregado");
}
async function editProd(id){
  const p = PRODS.find(x=>x.id===id); if(!p) return;
  const nombre = prompt("Nombre:", p.nombre); if(nombre===null) return;
  const descripcion = prompt("Descripcion:", p.descripcion||"")||"";
  const precio = Number((prompt("Precio:", p.precio||"")||"").replace(/\D/g,"")) || 0;
  const r = await pb.collection("productos").update(id,{ nombre, descripcion, precio });
  Object.assign(p,r); drawSecs(); toast("Producto actualizado");
}
async function toggleDisp(id,cur){ const r=await pb.collection("productos").update(id,{ disponible:!cur }); const p=PRODS.find(x=>x.id===id); if(p)p.disponible=r.disponible; drawSecs(); }
async function uploadFile(col,id,field,file){
  const fd=new FormData(); fd.append(field,file);
  const res=await fetch(`${PB_URL}/api/collections/${col}/records/${id}`,{ method:"PATCH", headers:{ Authorization: pb.authStore.token }, body: fd });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function subirFoto(id,file){ if(!file) return; toast("Subiendo foto..."); try{ const r=await uploadFile("productos",id,"foto",file); const p=PRODS.find(x=>x.id===id); if(p)p.foto=r.foto; drawSecs(); toast("Foto subida"); }catch(e){ console.error(e); toast("No se pudo subir la foto"); } }
async function delProd(id){ if(!confirm("Eliminar producto?")) return; await pb.collection("productos").delete(id); PRODS=PRODS.filter(x=>x.id!==id); drawSecs(); toast("Eliminado"); }
async function descargarQR(){
  const url = location.origin + "/carta/" + (CARTA?.slug || route().slug);
  const api = "https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&margin=20&data=" + encodeURIComponent(url);
  try{ const r=await fetch(api); const b=await r.blob(); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="qr-"+(CARTA?.slug||"carta")+".png"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href); toast("QR descargado"); }
  catch(e){ window.open(api,"_blank"); }
}
function logout(){ pb.authStore.clear(); renderLogin(route().slug); }
function val(id){ return document.getElementById(id).value; }

window.addEventListener("hashchange", start);
start();
</script>
