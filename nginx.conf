server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Carta digital: URLs limpias /carta/<negocio> y /carta/<negocio>/editar -> SPA
    location /carta/ {
        try_files $uri $uri/ /carta/index.html;
    }

    # Resto del sitio (raiz, /app, /demos, /printia, assets) sirve estatico normal
    location / {
        try_files $uri $uri/ =404;
    }
}
